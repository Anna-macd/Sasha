<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ты моя валентинка ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(145deg, #ffb6c1 0%, #ff69b4 50%, #dc143c 100%);
            position: relative;
            padding: 20px;
        }

        .background-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-heart {
            position: absolute;
            font-size: 3rem;
            opacity: 0.2;
            color: #fff;
            user-select: none;
            animation: float 10s infinite linear;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
        }

        .bg-heart:nth-child(1) { top: 10%; left: 5%; font-size: 5rem; animation-duration: 14s; opacity: 0.15; }
        .bg-heart:nth-child(2) { top: 70%; left: 15%; font-size: 4rem; animation-duration: 11s; opacity: 0.2; }
        .bg-heart:nth-child(3) { top: 20%; left: 80%; font-size: 6rem; animation-duration: 16s; opacity: 0.1; }
        .bg-heart:nth-child(4) { top: 85%; left: 70%; font-size: 3.5rem; animation-duration: 9s; opacity: 0.25; }
        .bg-heart:nth-child(5) { top: 40%; left: 45%; font-size: 7rem; animation-duration: 18s; opacity: 0.1; }
        .bg-heart:nth-child(6) { top: 15%; left: 30%; font-size: 4.5rem; animation-duration: 12s; opacity: 0.2; }
        .bg-heart:nth-child(7) { top: 60%; left: 85%; font-size: 5.5rem; animation-duration: 15s; opacity: 0.15; }
        .bg-heart:nth-child(8) { top: 75%; left: 5%; font-size: 4rem; animation-duration: 13s; opacity: 0.2; }
        .bg-heart:nth-child(9) { top: 30%; left: 15%; font-size: 6rem; animation-duration: 17s; opacity: 0.1; }
        .bg-heart:nth-child(10) { top: 90%; left: 45%; font-size: 5rem; animation-duration: 12s; opacity: 0.2; }

        @keyframes float {
            0% { transform: translateY(0px) translateX(0px) rotate(0deg); }
            33% { transform: translateY(-30px) translateX(20px) rotate(5deg); }
            66% { transform: translateY(20px) translateX(-20px) rotate(-5deg); }
            100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
        }

        .valentine-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 240, 245, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 60px 60px 40px 40px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(180, 0, 60, 0.4);
            border: 3px solid rgba(255, 105, 180, 0.8);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #a52a2a;
            text-shadow: 2px 2px 0 #ffc0cb;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .big-heart-button {
            background: none;
            border: none;
            font-size: 12rem;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
            display: block;
            margin: 20px auto;
            filter: drop-shadow(0 10px 15px rgba(200, 0, 0, 0.6));
            outline: none;
        }

        .big-heart-button:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 15px 20px rgba(220, 20, 60, 0.8));
        }

        .big-heart-button:active {
            transform: scale(0.95);
        }

        .hint {
            font-size: 1.4rem;
            color: #8b0000;
            background-color: rgba(255, 182, 193, 0.7);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 10px;
            font-weight: bold;
            border: 2px solid #ff69b4;
        }

        .photo-popup {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            border: 3px solid #ff1493;
            display: none;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.1) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .photo-popup img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.5);
            border: 5px solid white;
            display: block;
            margin: 0 auto;
        }

        .photo-caption {
            margin-top: 15px;
            font-size: 1.5rem;
            color: #b22222;
            font-weight: bold;
            text-shadow: 1px 1px 0 #ffb6c1;
        }

        .decor-heart {
            color: #ff69b4;
            font-size: 2rem;
            margin: 0 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @media (max-width: 600px) {
            .big-heart-button { font-size: 10rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="background-hearts">
        <div class="bg-heart">❤️</div>
        <div class="bg-heart">❤️</div>
        <div class="bg-heart">❤️</div>
        <div class="bg-heart">❤️</div>
        <div class="bg-heart">❤️</div>
        <div class="bg-heart">❤️</div>
        <div class="bg-heart">❤️</div>
        <div class="bg-heart">❤️</div>
        <div class="bg-heart">❤️</div>
        <div class="bg-heart">❤️</div>
    </div>

    <div class="valentine-card">
        <h1>
            <span class="decor-heart">❤️</span> С Днём всех Влюблённых! <span class="decor-heart">❤️</span>
        </h1>

        <button class="big-heart-button" id="heartButton">❤️</button>

        <div class="hint" id="hintText">Нажми на сердце ❤️</div>

        <div class="photo-popup" id="photoPopup">
            <img src="https://raw.githubusercontent.com/Anna-macd/Sasha/main/shasha.jpg" alt="Наше фото" id="valentineImage">
            <div class="photo-caption">Мой лев 💖</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const heartButton = document.getElementById('heartButton');
            const photoPopup = document.getElementById('photoPopup');
            const hintText = document.getElementById('hintText');

            heartButton.addEventListener('click', function() {
                photoPopup.style.display = 'block';
                hintText.textContent = 'Это ты❤️';
                
                heartButton.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    heartButton.style.transform = 'scale(1)';
                }, 200);
                
                heartButton.style.color = '#ff1493';
                setTimeout(() => {
                    heartButton.style.color = '';
                }, 300);
            });

            heartButton.style.animation = 'pulse 2s infinite';
        });
    </script>
</body>
</html>
