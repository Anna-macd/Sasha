<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ты моя валентинка ❤️</title>
    <style>
        /* Сброс отступов и устанавливаем высоту на всю страницу */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            /* Основной градиент фона - розовые и красные тона */
            background: linear-gradient(145deg, #ffb6c1 0%, #ff69b4 50%, #dc143c 100%);
            position: relative;
            padding: 20px;
        }

        /* Контейнер для полупрозрачных сердечек на фоне */
        .background-hearts {
            position: fixed; /* Чтобы сердечки были на весь экран и не двигались */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Чтобы были позади основного контента */
            pointer-events: none; /* Чтобы сердечки не мешали кликать по кнопкам */
            overflow: hidden;
        }

        /* Стили для самих полупрозрачных сердечек */
        .bg-heart {
            position: absolute;
            font-size: 3rem; /* Размер сердечка */
            opacity: 0.2; /* Полупрозрачность */
            color: #fff; /* Белый цвет, но из-за градиента фона будет выглядеть нежно */
            user-select: none;
            animation: float 10s infinite linear; /* Плавное покачивание */
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
        }

        /* Разное положение и анимация для каждого сердечка */
        .bg-heart:nth-child(1) { top: 10%; left: 5%; font-size: 5rem; animation-duration: 14s; opacity: 0.15; }
        .bg-heart:nth-child(2) { top: 70%; left: 15%; font-size: 4rem; animation-duration: 11s; opacity: 0.2; }
        .bg-heart:nth-child(3) { top: 20%; left: 80%; font-size: 6rem; animation-duration: 16s; opacity: 0.1; }
        .bg-heart:nth-child(4) { top: 85%; left: 70%; font-size: 3.5rem; animation-duration: 9s; opacity: 0.25; }
        .bg-heart:nth-child(5) { top: 40%; left: 45%; font-size: 7rem; animation-duration: 18s; opacity: 0.1; }
        .bg-heart:nth-child(6) { top: 15%; left: 30%; font-size: 4.5rem; animation-duration: 12s; opacity: 0.2; }
        .bg-heart:nth-child(7) { top: 60%; left: 85%; font-size: 5.5rem; animation-duration: 15s; opacity: 0.15; }
        .bg-heart:nth-child(8) { top: 75%; left: 5%; font-size: 4rem; animation-duration: 13s; opacity: 0.2; }
        .bg-heart:nth-child(9) { top: 30%; left: 15%; font-size: 6rem; animation-duration: 17s; opacity: 0.1; }
        .bg-heart:nth-child(10) { top: 90%; left: 45%; font-size: 5rem; animation-duration: 12s; opacity: 0.2; }

        /* Анимация плавания вверх-вниз и по горизонтали */
        @keyframes float {
            0% {
                transform: translateY(0px) translateX(0px) rotate(0deg);
            }
            33% {
                transform: translateY(-30px) translateX(20px) rotate(5deg);
            }
            66% {
                transform: translateY(20px) translateX(-20px) rotate(-5deg);
            }
            100% {
                transform: translateY(0px) translateX(0px) rotate(0deg);
            }
        }

        /* Карточка с основным контентом (поверх фоновых сердечек) */
        .valentine-card {
            position: relative;
            z-index: 10; /* Чтобы быть выше фоновых сердечек */
            background: rgba(255, 240, 245, 0.7); /* Полупрозрачный бело-розовый фон для карточки */
            backdrop-filter: blur(5px); /* Эффект матового стекла */
            border-radius: 60px 60px 40px 40px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(180, 0, 60, 0.4);
            border: 3px solid rgba(255, 105, 180, 0.8);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #a52a2a; /* Коричнево-красный */
            text-shadow: 2px 2px 0 #ffc0cb;
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* Стили для главного сердца (кнопки) */
        .big-heart-button {
            background: none;
            border: none;
            font-size: 12rem; /* Огромное сердце */
            line-height: 1;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
            display: block;
            margin: 20px auto;
            filter: drop-shadow(0 10px 15px rgba(200, 0, 0, 0.6));
            outline: none; /* Убираем обводку при фокусе для красоты */
        }

        .big-heart-button:hover {
            transform: scale(1.1); /* Увеличиваем при наведении */
            filter: drop-shadow(0 15px 20px rgba(220, 20, 60, 0.8));
        }

        .big-heart-button:active {
            transform: scale(0.95); /* Эффект нажатия */
        }

        /* Текст подсказка под сердцем */
        .hint {
            font-size: 1.4rem;
            color: #8b0000; /* Темно-красный */
            background-color: rgba(255, 182, 193, 0.7);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 10px;
            font-weight: bold;
            border: 2px solid #ff69b4;
        }

        /* Контейнер для всплывающей фотографии (скрыт по умолчанию) */
        .photo-popup {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            border: 3px solid #ff1493; /* Глубокий розовый */
            display: none; /* Изначально фото скрыто */
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Веселая анимация появления */
        }

        /* Анимация "выпрыгивания" */
        @keyframes popIn {
            0% {
                transform: scale(0.1) rotate(-10deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.2) rotate(5deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* Стили для самой картинки */
        .photo-popup img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.5);
            border: 5px solid white;
            display: block;
            margin: 0 auto;
        }

        /* Подпись под фото */
        .photo-caption {
            margin-top: 15px;
            font-size: 1.5rem;
            color: #b22222; /* Огнеупорный кирпич */
            font-weight: bold;
            text-shadow: 1px 1px 0 #ffb6c1;
        }

        /* Маленькие сердечки-украшения */
        .decor-heart {
            color: #ff69b4;
            font-size: 2rem;
            margin: 0 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Адаптация для маленьких экранов */
        @media (max-width: 600px) {
            .big-heart-button {
                font-size: 10rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

            </div>

    </div>

    <script>
        // Ждем, когда весь HTML загрузится
        document.addEventListener('DOMContentLoaded', function() {
            // Находим элементы на странице
            const heartButton = document.getElementById('heartButton');
            const photoPopup = document.getElementById('photoPopup');
            const hintText = document.getElementById('hintText');
            const valentineImage = document.getElementById('valentineImage');

            // --- Важно: Здесь нужно установить ссылку на твою фотографию ---
            // Если ты забыл(а) сделать это в теге <img>, можно сделать это и через JavaScript.
            // Раскомментируй следующую строку и вставь ссылку на фото.
            // valentineImage.src = 'https://example.com/tvoya-foto.jpg'; // <-- ССЫЛКА ЗДЕСЬ

            // Проверка: если ссылка в атрибуте src всё ещё заглушка, покажем предупреждение (но сайт будет работать)
            if (valentineImage.src.includes('YOUR_IMAGE_URL_HERE')) {
                console.warn('⚠️ Не забудь заменить ссылку на фотографию в теге <img> в коде HTML!');
                // Можно временно поставить заглушку, чтобы было наглядно (но лучше убрать это в реальном usage)
                // Для демонстрации, если не вставить фото, покажем просто розовый квадрат с текстом
                valentineImage.style.display = 'none'; // Скрываем сломанную картинку
                // Создадим заглушку, чтобы дизайн не сломался (но лучше заменить на реальное фото!)
                const parent = photoPopup;
                const caption = document.querySelector('.photo-caption');
                const placeholderDiv = document.createElement('div');
                placeholderDiv.textContent = '📸 ЗДЕСЬ БУДЕТ ТВОЕ ФОТО';
                placeholderDiv.style.backgroundColor = '#ffb6c1';
                placeholderDiv.style.padding = '50px 20px';
                placeholderDiv.style.borderRadius = '30px';
                placeholderDiv.style.fontSize = '1.5rem';
                placeholderDiv.style.color = '#8b0000';
                placeholderDiv.style.fontWeight = 'bold';
                placeholderDiv.style.border = '3px dashed #ff1493';
                placeholderDiv.id = 'photoPlaceholder';
                parent.insertBefore(placeholderDiv, caption);
                console.log('🖼️ Показываем заглушку, так как фото не указано. Не забудь вставить свою фотку!');
            }

            // Добавляем обработчик события "клик" на большое сердце
            heartButton.addEventListener('click', function() {
                // Показываем блок с фотографией
                photoPopup.style.display = 'block';

                // Меняем текст подсказки, чтобы было понятно, что фото уже тут
                hintText.textContent = 'Это ты❤️';

                // Можно добавить небольшую "изюминку" — например, заставить сердце радостно подпрыгнуть
                heartButton.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    heartButton.style.transform = 'scale(1)';
                }, 200);

                // Или если хочешь, чтобы сердце меняло цвет при клике
                heartButton.style.color = '#ff1493'; // Более яркий розовый
                setTimeout(() => {
                    heartButton.style.color = ''; // Возвращаем как было (стандартный красный)
                }, 300);

                // Если была заглушка, а ты потом добавишь фото через JS, можно её обновить
                // Но для простоты оставим так.
            });

            // Можно добавить эффект при загрузке страницы, чтобы сразу привлечь внимание к сердцу
            heartButton.style.animation = 'pulse 2s infinite';
        });
    </script>

</html>
